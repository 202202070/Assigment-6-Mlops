name: MLOps Gatekeeper Pipeline

on:
  push:
    branches:
      - "**"

jobs:

  linter:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: run linter
        run: echo "linter running"


  train:
    needs: linter
    runs-on: ubuntu-latest

    if: >
      needs.linter.result == 'success' &&
      github.ref == 'refs/heads/main' 
      

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: install dependencies
        run: |
          pip install -r requirements.txt || true

      - name: run training script
        run: python train.py

      - name: handle failure
        if: failure()
        run: |
          echo "Training failed!" > error_logs.txt

      - name: upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt


      - name: cleanup logs
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."
